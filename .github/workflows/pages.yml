name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-bt:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Sync to BT Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BT_SSH_HOST }}
          port: ${{ secrets.BT_SSH_PORT }}
          username: ${{ secrets.BT_SSH_USER }}
          key: ${{ secrets.BT_SSH_KEY }}
          script: |
            cd /www/wwwroot/doorlock.zhongshanzhiliang.top
            git fetch origin main
            git reset --hard FETCH_HEAD
